apiVersion: apps/v1
kind: Deployment
metadata:
  name: tollywood-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tollywood-app
  template:
    metadata:
      labels:
        app: tollywood-app
    spec:
      containers:
      - name: tollywood-app-container
        image: prasadvitt/python-k8s-app:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: tollywood-app-service
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30007
  selector:
    app: tollywood-app
